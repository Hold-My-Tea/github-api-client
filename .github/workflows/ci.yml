name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore: ['docs/**', "**.md"]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # ========== 1. БЕЗОПАСНОСТЬ ==========
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-safety-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-safety-

      - name: Install safety
        run: pip install safety

      - name: Check production dependencies
        run: safety check -r requirements.txt --full-report

      - name: Check dev dependencies
        run: safety check -r requirements-dev.txt --full-report

  # ========== 2. ЛИНТЕРЫ (быстро, без установки всех зависимостей) ==========
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: |
          flake8 src/github_api_client tests \
            --count --max-complexity=10 --max-line-length=127 --statistics

  # ========== 3. ТЕСТЫ (на матрице OS и Python) ==========
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [security, lint]   # ← Запускаются только после security и lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Test with pytest
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GITHUB_USERNAME: ${{ secrets.USERNAME }}
          GITHUB_API_WAIT: 2
        run: |
          pytest tests/ -v -m "not performance" \
            --cov=src/github_api_client \
            --cov-report=xml \
            --alluredir=allure-results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        if: always()

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: allure-results
        if: always()

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
        if: always()

  # ========== 4. ПРОВЕРКА СБОРКИ (build) ==========
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]   # ← Запускается только после успешных тестов
    if: github.event_name != 'pull_request'   # Не запускаем на PR, только на push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
        if: always()

  # ========== 5. НОЧНЫЕ PERFORMANCE-ТЕСТЫ ==========
  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [build]   # ← Запускается только после успешной сборки
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run performance tests
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GITHUB_USERNAME: ${{ secrets.USERNAME }}
          GITHUB_API_WAIT: 2
        run: |
          pytest tests/ -v -m "performance" \
            --cov=src/github_api_client \
            --cov-report=xml \
            --cov-append \
            --alluredir=allure-results-performance

      - name: Upload coverage to Codecov (performance)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: performance
          name: codecov-performance
          fail_ci_if_error: false
        if: always()

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-performance
          path: allure-results-performance
        if: always()