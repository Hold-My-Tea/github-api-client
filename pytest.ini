[pytest]
# Paths for test discovery
testpaths = tests

# Default pytest options
addopts = -v --strict-markers --tb=short

# Custom markers for test categorization
markers =
    positive: Tests verifying correct functionality (happy path)
    negative: Tests verifying error handling and edge cases
    smoke: Basic tests for quick sanity check (smoke testing)
    regression: Full test suite for regression testing
    integration: Integration tests (require real API access)
    performance: Tests measuring response time and performance